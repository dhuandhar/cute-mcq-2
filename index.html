<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUET UG प्रश्न पत्र — Set 2 | इतिहास | भूगोल | राजनीति विज्ञान</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f4f4f0;color:#1a1a1a;min-height:100vh}
  .app{max-width:820px;margin:0 auto;padding:1rem}
  .header{text-align:center;padding:1.5rem 1rem;background:#fff;border-radius:12px;border:1px solid #e0e0d8;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
  .header h1{font-size:22px;font-weight:600;color:#1a1a1a;margin-bottom:6px}
  .header p{font-size:13px;color:#666}
  .header .sub{font-size:12px;color:#999;margin-top:4px}
  .set-badge{display:inline-block;background:#fff3e0;color:#e65100;border:1px solid #ffcc80;border-radius:6px;font-size:12px;font-weight:600;padding:3px 10px;margin-top:6px}
  .tabs{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
  .tab{flex:1;min-width:120px;padding:11px 8px;border:1.5px solid #ddd;background:#fff;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:#666;transition:all 0.15s;font-family:inherit}
  .tab.active{background:#1a56db;color:#fff;border-color:#1a56db}
  .tab:hover:not(.active){background:#f0f4ff;border-color:#1a56db;color:#1a56db}
  .paper{display:none}.paper.active{display:block}
  .paper-header{background:#fff;border-radius:12px;border:1px solid #e0e0d8;padding:1rem 1.25rem;margin-bottom:1rem}
  .paper-header h2{font-size:16px;font-weight:600;color:#1a1a1a}
  .paper-header p{font-size:13px;color:#666;margin-top:3px}
  .meta-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .badge{background:#f4f4f0;padding:4px 12px;border-radius:6px;font-size:12px;color:#555;border:1px solid #e0e0d8}
  .badge.timer{font-weight:600;color:#1a56db;background:#e8f0fe;border-color:#c5d5f8}
  .prog-row{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
  .prog-bar{flex:1;height:5px;background:#e0e0d8;border-radius:3px;overflow:hidden}
  .prog-fill{height:100%;background:#1a56db;transition:width 0.3s;border-radius:3px}
  .prog-txt{font-size:12px;color:#666;white-space:nowrap;font-weight:500}
  .qcard{background:#fff;border-radius:12px;border:1px solid #e0e0d8;padding:1rem 1.25rem;margin-bottom:10px}
  .qnum{font-size:11px;color:#999;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;font-weight:500}
  .qtxt{font-size:15px;line-height:1.65;margin-bottom:12px;color:#1a1a1a}
  .opts{display:flex;flex-direction:column;gap:6px}
  .opt{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border:1.5px solid #e0e0d8;border-radius:8px;cursor:pointer;font-size:14px;line-height:1.5;text-align:left;background:#fafafa;color:#1a1a1a;width:100%;font-family:inherit;transition:all 0.12s}
  .opt:hover:not(:disabled){background:#f0f4ff;border-color:#1a56db}
  .opt.sel{background:#e8f0fe;border-color:#1a56db;color:#1a56db}
  .opt.ok{background:#e6f4ea;border-color:#34a853;color:#1e6b38}
  .opt.bad{background:#fce8e6;border-color:#ea4335;color:#c0392b}
  .opt:disabled{cursor:default}
  .olabel{font-weight:600;min-width:20px;flex-shrink:0}
  .exp{font-size:13px;padding:10px 13px;background:#f8f9fa;border-radius:8px;margin-top:10px;color:#444;border-left:3px solid #1a56db;display:none;line-height:1.65}
  .exp.show{display:block}
  .submit-wrap{margin:1.5rem 0;text-align:center}
  .submit-btn{padding:13px 40px;border:none;border-radius:8px;background:#1a56db;cursor:pointer;font-size:15px;font-weight:600;color:#fff;font-family:inherit;transition:background 0.15s}
  .submit-btn:hover{background:#1246b5}
  .result-box{background:#fff;border-radius:12px;border:1px solid #e0e0d8;padding:1.5rem;margin-top:1rem;text-align:center;display:none;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
  .result-box.show{display:block}
  .score-big{font-size:48px;font-weight:700;margin-bottom:4px}
  .score-lbl{font-size:14px;color:#666;margin-bottom:16px}
  .score-grid{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
  .scard{background:#f4f4f0;border-radius:8px;padding:12px 20px;font-size:13px;color:#555;border:1px solid #e0e0d8}
  .scard span{display:block;font-size:26px;font-weight:700;margin-bottom:2px}
  .rating{font-size:15px;margin-bottom:16px;font-weight:500}
  .act-row{display:flex;gap:8px;justify-content:center;margin-top:8px}
  .btn-reset{padding:11px 24px;border:1.5px solid #1a56db;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;font-weight:500;color:#1a56db;font-family:inherit}
  .btn-reset:hover{background:#e8f0fe}
  @media(max-width:500px){
    .header h1{font-size:18px}
    .tab{font-size:12px;padding:9px 6px}
    .qtxt{font-size:14px}
    .opt{font-size:13px}
    .score-big{font-size:36px}
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🎓 CUET UG — प्रश्न पत्र</h1>
    <p>केंद्रीय विश्वविद्यालय प्रवेश परीक्षा | माध्यम: हिन्दी | कठिनाई: मध्यम-कठिन</p>
    <p class="sub">प्रत्येक विषय में 50 प्रश्न | समय: 60 मिनट</p>
    <span class="set-badge">सेट 2</span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="sw('history')">📜 इतिहास</button>
    <button class="tab" onclick="sw('geo')">🌏 भूगोल</button>
    <button class="tab" onclick="sw('pol')">⚖️ राजनीति विज्ञान</button>
  </div>
  <div id="p-history" class="paper active"></div>
  <div id="p-geo" class="paper"></div>
  <div id="p-pol" class="paper"></div>
</div>
<script>
const P={
history:{title:"इतिहास",sub:"प्राचीन, मध्यकालीन एवं आधुनिक भारतीय इतिहास — सेट 2",time:60,questions:[
{q:"हड़प्पा सभ्यता में 'पशुपति मुहर' पर अंकित देवता को किस कारण शिव का पूर्वरूप माना जाता है?",o:["मुहर पर त्रिशूल अंकित है","देवता योगासन में बैठे हैं और पशुओं से घिरे हैं","मुहर पर गंगा-यमुना अंकित हैं","देवता के चार मुख हैं"],a:1,e:"पशुपति मुहर पर एक तीन मुख वाला देवता ध्यानमग्न अवस्था में पशुओं से घिरा है — यह शिव के 'पशुपति' (पशुओं के स्वामी) स्वरूप से मेल खाता है।"},
{q:"सिंधु घाटी सभ्यता के पतन के लिए कौन सा कारण पुरातात्विक साक्ष्यों द्वारा सर्वाधिक समर्थित है?",o:["आर्य आक्रमण","जलवायु परिवर्तन और नदियों का मार्ग बदलना","भूकंप","व्यापार में गिरावट"],a:1,e:"आधुनिक शोध — विशेषतः नदी-भू-आकृति विज्ञान — यह दर्शाते हैं कि सरस्वती नदी के सूखने और मानसून की अनिश्चितता से कृषि आधार नष्ट हुआ, जो पतन का प्रमुख कारण था।"},
{q:"'अष्टाध्यायी' किसकी रचना है और यह किस विषय पर है?",o:["कौटिल्य — अर्थशास्त्र","पाणिनि — संस्कृत व्याकरण","पतंजलि — योग","वात्स्यायन — नीतिशास्त्र"],a:1,e:"पाणिनि की 'अष्टाध्यायी' संस्कृत व्याकरण का सर्वोच्च ग्रंथ है — आठ अध्यायों में लगभग 4,000 सूत्र। यह भाषाविज्ञान का विश्व का पहला व्यवस्थित ग्रंथ माना जाता है।"},
{q:"मगध साम्राज्य की शक्ति के उदय में कौन सा भौगोलिक कारक सर्वाधिक महत्वपूर्ण था?",o:["हिमालय की रक्षा","लोहे की खदानें और उपजाऊ गंगा मैदान","समुद्री व्यापार मार्ग","मरुस्थलीय दुर्गम्यता"],a:1,e:"मगध (आधुनिक बिहार) के पास दक्षिण बिहार की लोहे की खदानें थीं — इससे श्रेष्ठ हथियार और कृषि उपकरण बने। उपजाऊ गंगा मैदान ने अधिशेष उत्पादन दिया।"},
{q:"'सारनाथ अभिलेख' में अशोक ने संघ-भेद को किस दंड से दंडनीय बताया?",o:["मृत्युदंड","देश-निर्वासन","श्वेत वस्त्र पहनकर अवास-स्थान से निष्कासन","कारावास"],a:2,e:"अशोक के सारनाथ अभिलेख में कहा गया है कि जो भिक्षु या भिक्षुणी संघ में फूट डालेगा, उसे श्वेत वस्त्र धारण करा कर अवास-स्थान से निकाला जाए।"},
{q:"चन्द्रगुप्त द्वितीय (विक्रमादित्य) के शासनकाल को 'स्वर्ण युग' क्यों कहा जाता है? निम्न में से कौन सा कारण सही नहीं है?",o:["कालिदास जैसे साहित्यकारों का दरबार में होना","आर्यभट्ट का गणितीय योगदान","चीन के साथ भूमि-सेना विजय अभियान","फाह्यान की यात्रा जो समृद्धि का वर्णन करती है"],a:2,e:"गुप्त काल में चीन के विरुद्ध कोई भूमि अभियान नहीं था। स्वर्ण युग की पहचान — साहित्य, कला, गणित, और समृद्धि — सही है, पर चीन विजय नहीं।"},
{q:"'बौद्ध संगीतियाँ' (Councils) के बारे में कौन सा कथन सही है?",o:["चारों संगीतियाँ पाटलिपुत्र में हुईं","प्रथम संगीति राजगृह में, द्वितीय वैशाली में, तृतीय पाटलिपुत्र में, चतुर्थ कश्मीर में","सभी संगीतियाँ अशोक के काल में हुईं","प्रथम संगीति बुद्ध के जीवनकाल में हुई"],a:1,e:"प्रथम (राजगृह, अजातशत्रु), द्वितीय (वैशाली, कालाशोक), तृतीय (पाटलिपुत्र, अशोक), चतुर्थ (कश्मीर, कनिष्क) — यही सही क्रम है।"},
{q:"'एरण अभिलेख' (510 ई.) किस कारण ऐतिहासिक महत्व रखता है?",o:["यह गुप्त वंश का पहला अभिलेख है","इसमें 'सती प्रथा' का पहला अभिलेखीय साक्ष्य है","इसमें भूमि अनुदान का उल्लेख है","यह ब्राह्मी लिपि का पहला उदाहरण है"],a:1,e:"एरण (मध्य प्रदेश) अभिलेख में भानुगुप्त के सेनापति गोपराज की मृत्यु पर उनकी पत्नी के सती होने का उल्लेख है — यह भारतीय इतिहास में सती प्रथा का पहला अभिलेखीय साक्ष्य है।"},
{q:"अरबों ने 712 ई. में सिंध पर विजय प्राप्त की। इसका नेतृत्व किसने किया?",o:["अल-हज्जाज","मुहम्मद बिन कासिम","तारिक बिन जियाद","महमूद गजनवी"],a:1,e:"17 वर्षीय मुहम्मद बिन कासिम ने राजा दाहिर को हराकर सिंध जीता — यह भारत में पहली स्थायी अरब विजय थी।"},
{q:"'चोल प्रशासन' की सबसे विशिष्ट विशेषता कौन सी थी?",o:["केंद्रीकृत नौकरशाही","ग्राम स्वशासन (उर, सभा, नगरम् जैसी संस्थाएँ)","सामंती व्यवस्था","सैन्य शासन"],a:1,e:"चोल प्रशासन में 'उर' (सामान्य ग्रामीण सभा), 'महासभा' (ब्राह्मण गाँवों में), और 'नगरम्' (व्यापारिक केंद्र) स्वायत्त थे — यह स्थानीय स्वशासन का उत्कृष्ट उदाहरण है।"},
{q:"'तराइन का द्वितीय युद्ध' (1192) क्यों निर्णायक था?",o:["इसमें पृथ्वीराज चौहान ने मुहम्मद गोरी को हराया","इसमें मुहम्मद गोरी ने पृथ्वीराज को हराकर उत्तर भारत में तुर्क शासन की नींव रखी","यह मराठों की पहली जीत थी","इसमें राजपूतों ने एकजुट होकर लड़ाई की"],a:1,e:"1192 में तराइन के द्वितीय युद्ध में पृथ्वीराज चौहान की पराजय के बाद उत्तर भारत पर तुर्क प्रभुत्व स्थायी हो गया — यही दिल्ली सल्तनत की वास्तविक नींव थी।"},
{q:"'रज़िया सुल्तान' के शासन के बारे में कौन सा तथ्य सही है?",o:["वे दिल्ली सल्तनत की पहली और एकमात्र महिला शासक थीं","वे शासन में पर्दा करती थीं","उनकी माँ ने उन्हें उत्तराधिकारी नियुक्त किया","उन्होंने 20 वर्ष शासन किया"],a:0,e:"रज़िया (1236-1240) दिल्ली सल्तनत की एकमात्र महिला सुल्तान थीं। उन्होंने बिना पर्दे के दरबार किया और हाथी पर सवार होकर सेना का नेतृत्व किया। उनके पिता इल्तुतमिश ने उन्हें नामांकित किया था।"},
{q:"'विजयनगर और बहमनी' साम्राज्यों के बीच किस क्षेत्र को लेकर सबसे अधिक संघर्ष हुआ?",o:["केरल तट","रायचूर दोआब","उड़ीसा","मालाबार तट"],a:1,e:"कृष्णा और तुंगभद्रा नदियों के बीच का रायचूर दोआब — उपजाऊ भूमि और रणनीतिक स्थिति के कारण — दोनों साम्राज्यों के बीच निरंतर संघर्ष का केंद्र था।"},
{q:"मुगल चित्रकला के बारे में कौन सा कथन सही है?",o:["यह पूरी तरह फारसी शैली पर आधारित थी","इसमें भारतीय और फारसी शैलियों का संश्लेषण हुआ — अकबर के काल में विशेषतः","यह केवल धार्मिक विषयों पर थी","यह औरंगजेब ने विकसित की"],a:1,e:"अकबर के दरबार में फारसी और भारतीय (राजपूत) चित्रकारों के मिलन से एक नई मुगल शैली बनी — प्राकृतिक दृश्य, जीवंत रंग, और व्यक्तिचित्र इसकी विशेषताएँ थीं।"},
{q:"'शेरशाह सूरी' का सर्वाधिक स्थायी प्रशासनिक योगदान कौन सा था?",o:["मनसबदारी व्यवस्था","भूमि माप और रुपये का प्रचलन, ग्रांड ट्रंक रोड","जागीर व्यवस्था","दीवान-ए-कोही"],a:1,e:"शेरशाह ने भूमि का वैज्ञानिक सर्वेक्षण किया, चाँदी का रुपया चलाया (जो आज भी जारी है), और पेशावर से बंगाल तक सड़क (GT Road) बनाई — ये योगदान मुगलों से भी अधिक टिकाऊ सिद्ध हुए।"},
{q:"औरंगजेब की 'जजिया कर' पुनर्स्थापना (1679) के क्या परिणाम हुए?",o:["राजस्व में बड़ी वृद्धि","राजपूत विद्रोह तेज हुए और हिंदू-मुस्लिम संबंध बिगड़े","कोई महत्वपूर्ण परिणाम नहीं","मराठों ने इसका स्वागत किया"],a:1,e:"जजिया पुनर्स्थापना ने मेवाड़ के राजपूतों, जाटों और मराठों के विद्रोह को बल दिया। अकबर द्वारा समाप्त किए गए इस कर की वापसी साम्राज्य के पतन का एक सांकेतिक कारण भी बनी।"},
{q:"'मराठा साम्राज्य' में 'अष्टप्रधान' क्या था?",o:["शिवाजी की आठ रानियाँ","आठ मंत्रियों की परिषद जो राज्य का संचालन करती थी","आठ सैन्य टुकड़ियाँ","आठ प्रांत"],a:1,e:"शिवाजी का अष्टप्रधान — पेशवा (प्रधानमंत्री), अमात्य, सचिव, मंत्री, सेनापति, पंडितराव, न्यायाधीश, दानाध्यक्ष — आठ विभागों का मंत्रिमंडल था।"},
{q:"'1857 के विद्रोह' में 'एनफील्ड राइफल' का विवाद क्यों हुआ?",o:["यह राइफल बहुत भारी थी","कारतूस में गाय और सुअर की चर्बी लगी होने की अफवाह थी","यह राइफल भारतीयों को नहीं दी गई","यह राइफल बहुत महँगी थी"],a:1,e:"एनफील्ड राइफल के कारतूस को दाँत से काटना पड़ता था। अफवाह फैली कि उसमें गाय (हिंदुओं के लिए पवित्र) और सुअर (मुसलमानों के लिए वर्जित) की चर्बी है — इसने दोनों समुदायों को एक साथ भड़काया।"},
{q:"'लॉर्ड डलहौजी' की 'हड़प नीति' (Doctrine of Lapse) क्या थी?",o:["विदेशी व्यापार पर कर","यदि कोई राजा बिना प्राकृतिक उत्तराधिकारी के मरे तो राज्य ब्रिटिश साम्राज्य में मिला लिया जाए","कंपनी के ऋण माफ करने की नीति","भारतीय सेना में सुधार"],a:1,e:"1848-56 के बीच डलहौजी ने इस नीति से सतारा, झाँसी, नागपुर जैसी रियासतें हड़पीं — दत्तक पुत्र को उत्तराधिकारी नहीं माना। इसी से झाँसी की रानी की नाराजगी और 1857 के विद्रोह में भूमिका बनी।"},
{q:"'स्वदेशी आंदोलन' (1905) बंगाल विभाजन के विरोध में शुरू हुआ। इसका मुख्य आर्थिक पहलू क्या था?",o:["भारतीयों को सरकारी नौकरी में वरीयता","विदेशी वस्तुओं का बहिष्कार और स्वदेशी उद्योग को प्रोत्साहन","कृषि कर में कमी","ब्रिटिश बैंकों पर प्रतिबंध"],a:1,e:"स्वदेशी आंदोलन ने पहली बार आर्थिक राष्ट्रवाद को जन आंदोलन से जोड़ा — विदेशी कपड़ों की होली जलाई गई, टाटा जैसे उद्योगों को प्रोत्साहन मिला।"},
{q:"'महात्मा गाँधी' और 'बी. आर. अंबेडकर' के बीच 'पूना पैक्ट' (1932) किस विषय पर हुआ?",o:["भारत की स्वतंत्रता","दलितों के लिए पृथक निर्वाचन क्षेत्र बनाम संयुक्त निर्वाचन में आरक्षित सीटें","भूमि सुधार","भाषायी आधार पर प्रांत"],a:1,e:"अंबेडकर दलितों के लिए पृथक निर्वाचक मंडल चाहते थे। गाँधी ने इसके विरोध में आमरण अनशन किया। पूना पैक्ट में समझौता हुआ — संयुक्त निर्वाचक मंडल में दलितों के लिए आरक्षित सीटें।"},
{q:"'भारतीय कम्युनिस्ट पार्टी' की स्थापना कब और कहाँ हुई?",o:["1920, बॉम्बे","1920, ताशकंद (सोवियत संघ)","1925, कानपुर","1930, दिल्ली"],a:1,e:"एम. एन. रॉय ने 1920 में ताशकंद में भारतीय कम्युनिस्ट पार्टी की स्थापना की — यह भारत के बाहर स्थापित पहली भारतीय राजनीतिक पार्टी थी।"},
{q:"'क्रिप्स मिशन' (1942) को भारतीयों ने अस्वीकार क्यों किया?",o:["इसने पूर्ण स्वतंत्रता दी","इसने युद्ध के बाद डोमिनियन स्टेटस का वादा किया पर वर्तमान में कोई सत्ता-हस्तांतरण नहीं किया","यह बहुत जल्दी आया","इसमें मुस्लिम लीग शामिल थी"],a:1,e:"गाँधी ने क्रिप्स प्रस्तावों को 'दिवालिया बैंक का भविष्य का वादा' कहा — भविष्य में डोमिनियन स्टेटस, वर्तमान में कुछ नहीं। इसीलिए यह कांग्रेस और मुस्लिम लीग दोनों ने अस्वीकार किया।"},
{q:"'आजाद हिंद सरकार' ने किन क्षेत्रों पर 'स्वतंत्र भारत' का शासन घोषित किया था?",o:["बर्मा","अंडमान-निकोबार द्वीप समूह","सिंगापुर","मलाया"],a:1,e:"21 अक्टूबर 1943 को सुभाष चंद्र बोस ने सिंगापुर में आजाद हिंद सरकार की घोषणा की। अंडमान-निकोबार पर जापान के सहयोग से नाममात्र का नियंत्रण स्थापित किया गया।"},
{q:"'रॉलट एक्ट' (1919) के विरुद्ध आंदोलन महत्वपूर्ण था क्योंकि:",o:["यह गाँधी का पहला अखिल भारतीय आंदोलन था","इसमें हिंसा नहीं हुई","यह केवल बंगाल में था","इसने ब्रिटिश शासन समाप्त किया"],a:0,e:"रॉलट एक्ट विरोधी आंदोलन (1919) गाँधी का पहला अखिल भारतीय सत्याग्रह था — इसी दौरान जलियाँवाला बाग हत्याकांड हुआ जिसने आंदोलन को और तीव्र बना दिया।"},
{q:"'सुभाष चंद्र बोस' ने 1939 में कांग्रेस अध्यक्ष पद से इस्तीफा क्यों दिया?",o:["स्वास्थ्य कारणों से","गाँधी के समर्थित उम्मीदवार पट्टाभि सीतारमैया को हराने के बाद आंतरिक विरोध से","ब्रिटिश दबाव में","INA बनाने के लिए"],a:1,e:"बोस ने गाँधी के उम्मीदवार को हराया पर कार्यसमिति में उनका समर्थन नहीं मिला। गाँधी ने पट्टाभि की हार को 'अपनी हार' बताया। बोस को अंततः इस्तीफा देना पड़ा।"},
{q:"'भारतीय स्वतंत्रता अधिनियम 1947' की सबसे महत्वपूर्ण विशेषता क्या थी?",o:["इसने भारत को गणराज्य घोषित किया","इसने भारत और पाकिस्तान को दो स्वतंत्र डोमिनियन के रूप में स्थापित किया और देशी रियासतों को तीनों विकल्प दिए","इसने संविधान सभा को भंग किया","इसने सेना का बँटवारा नहीं किया"],a:1,e:"1947 अधिनियम ने भारत और पाकिस्तान को डोमिनियन का दर्जा दिया। देशी रियासतों को भारत, पाकिस्तान या स्वतंत्र रहने का विकल्प दिया — हालाँकि स्वतंत्र रहना व्यावहारिक नहीं था।"},
{q:"'डॉ. बी. आर. अंबेडकर' ने संविधान के किस अनुच्छेद को 'हृदय और आत्मा' कहा?",o:["अनुच्छेद 14","अनुच्छेद 21","अनुच्छेद 32","अनुच्छेद 19"],a:2,e:"अंबेडकर ने अनुच्छेद 32 (संवैधानिक उपचारों का अधिकार) को संविधान की 'हृदय और आत्मा' कहा — क्योंकि यही अनुच्छेद सभी मूल अधिकारों को न्यायालय द्वारा लागू कराने का माध्यम है।"},
{q:"'नेहरू की विदेश नीति' में 'हिंदी-चीनी भाई-भाई' का नारा किस समझौते के संदर्भ में आया?",o:["1954 पंचशील समझौता","1962 का युद्ध विराम","1950 तिब्बत समझौता","1955 बांडुंग सम्मेलन"],a:0,e:"1954 में भारत-चीन व्यापार समझौते (तिब्बत पर) के अवसर पर पंचशील के पाँच सिद्धांत घोषित हुए और 'हिंदी-चीनी भाई-भाई' का नारा लगाया गया — जो 1962 के युद्ध के बाद खोखला साबित हुआ।"},
{q:"'तेभागा आंदोलन' (1946-47) किस राज्य में हुआ और इसकी माँग क्या थी?",o:["पंजाब — भूमि सुधार","बंगाल — फसल का दो-तिहाई हिस्सा किसान को","केरल — जमींदारी उन्मूलन","महाराष्ट्र — कृषि ऋण माफी"],a:1,e:"बंगाल में बटाईदार किसानों ने माँग की कि फसल का दो-तिहाई (तेभागा) उन्हें मिले, न कि आधा। यह किसान आंदोलन कम्युनिस्ट पार्टी के नेतृत्व में चला।"},
{q:"'संविधान सभा' में किस अनुच्छेद पर सर्वाधिक बहस हुई?",o:["अनुच्छेद 1 (भारत का नाम)","अनुच्छेद 370","अनुच्छेद 17 (अस्पृश्यता उन्मूलन)","अनुच्छेद 44 (समान नागरिक संहिता)"],a:3,e:"अनुच्छेद 44 (समान नागरिक संहिता) पर संविधान सभा में सबसे लंबी और भावनात्मक बहस हुई — मुस्लिम सदस्यों ने इसे धार्मिक स्वायत्तता पर आघात माना।"},
{q:"'कोरेगाँव युद्ध' (1818) महत्वपूर्ण था क्योंकि:",o:["इसमें मराठों ने अंग्रेजों को हराया","इसमें महार सैनिकों ने पेशवा बाजीराव द्वितीय को हराया — अंबेडकर इसे दलित सम्मान का प्रतीक मानते थे","यह पानीपत के बाद सबसे बड़ा युद्ध था","इसमें टीपू सुल्तान ने भाग लिया"],a:1,e:"1 जनवरी 1818 को ब्रिटिश सेना की महार टुकड़ी ने पेशवा की बड़ी सेना को हराया। अंबेडकर ने इसे दलितों की विजय के रूप में देखा — आज भी कोरेगाँव दलित गौरव का प्रतीक है।"},
{q:"'गदर पार्टी' की स्थापना कब और कहाँ हुई?",o:["1913, सैन फ्रांसिस्को (अमेरिका)","1905, लंदन","1920, ताशकंद","1915, बर्लिन"],a:0,e:"1913 में लाला हरदयाल के नेतृत्व में सैन फ्रांसिस्को में गदर पार्टी की स्थापना हुई — मुख्यतः पंजाबी प्रवासियों ने भारत में सशस्त्र क्रांति की योजना बनाई।"},
{q:"'चार्टर एक्ट 1833' का सबसे महत्वपूर्ण प्रावधान क्या था?",o:["ईस्ट इंडिया कंपनी का व्यापार एकाधिकार समाप्त","भारत में अंग्रेजों को बसने का अधिकार","सर्वोच्च न्यायालय की स्थापना","भारतीय सेना का गठन"],a:0,e:"चार्टर एक्ट 1833 ने ईस्ट इंडिया कंपनी के व्यापार एकाधिकार को पूरी तरह समाप्त किया और कंपनी को केवल प्रशासनिक निकाय बना दिया। इसी एक्ट में पहली बार भेदभाव-रहित नियुक्ति का प्रावधान भी था।"},
{q:"'वर्नाकुलर प्रेस एक्ट' (1878) किसने और क्यों लागू किया?",o:["लॉर्ड रिपन — शिक्षा प्रसार के लिए","लॉर्ड लिटन — भारतीय भाषाओं के समाचारपत्रों पर प्रतिबंध के लिए","लॉर्ड कर्जन — बंगाल विभाजन के विरोध को दबाने","लॉर्ड डलहौजी — व्यापार नियंत्रण"],a:1,e:"लॉर्ड लिटन ने 1878 में भारतीय भाषाओं के समाचारपत्रों की बढ़ती राष्ट्रवादी आवाज़ को दबाने के लिए यह कानून बनाया। इसे 'मुँह बंद करने का कानून' कहा गया। बाद में लॉर्ड रिपन ने इसे रद्द किया।"},
{q:"'भारत में रेलवे' का विस्तार किस दृष्टिकोण से उपनिवेशवाद का साधन था?",o:["रेलवे ने भारतीयों को रोजगार दिया","रेलवे ने कच्चे माल को बंदरगाहों तक और ब्रिटिश वस्तुओं को बाजारों तक पहुँचाया","रेलवे ने सांस्कृतिक एकता बनाई","रेलवे ने शहरीकरण बढ़ाया"],a:1,e:"दादाभाई नौरोजी के 'धन-निकास सिद्धांत' के अनुसार रेलवे ने भारत का आर्थिक शोषण तेज किया — कपास, जूट बंदरगाहों तक, मैनचेस्टर का कपड़ा अंदरूनी बाजारों तक।"},
{q:"'लखनऊ पैक्ट' (1916) में कांग्रेस और मुस्लिम लीग के बीच क्या समझौता हुआ?",o:["भारत का विभाजन","मुसलमानों के लिए पृथक निर्वाचन क्षेत्र और दोनों का स्वशासन के लिए एकजुट संघर्ष","जिन्ना को कांग्रेस अध्यक्ष बनाना","मुस्लिम लीग का विलय"],a:1,e:"लखनऊ पैक्ट में कांग्रेस ने मुसलमानों के पृथक निर्वाचन की माँग मान ली — बदले में दोनों संस्थाएँ स्वशासन के लिए एक साथ लड़ने पर सहमत हुईं। जिन्ना इस पैक्ट के सूत्रधार थे।"},
{q:"'इंडियन नेशनल कांग्रेस' के किस अधिवेशन में 'स्वराज' (Self-Rule) की माँग पहली बार की गई?",o:["1885 बॉम्बे","1906 कलकत्ता","1905 वाराणसी","1907 सूरत"],a:1,e:"1906 के कलकत्ता अधिवेशन में दादाभाई नौरोजी की अध्यक्षता में पहली बार 'स्वराज' को कांग्रेस का लक्ष्य घोषित किया गया।"},
{q:"'इल्बर्ट बिल विवाद' (1883) क्या था और इसका क्या महत्व था?",o:["भारतीय न्यायाधीशों को यूरोपीय अपराधियों पर मुकदमा चलाने का अधिकार — इससे नस्लीय भेदभाव उजागर हुआ","भारतीय सेना में सुधार","भूमि कर का विरोध","शिक्षा नीति पर विवाद"],a:0,e:"लॉर्ड रिपन के इल्बर्ट बिल ने भारतीय न्यायाधीशों को यूरोपीयों पर मुकदमा चलाने का अधिकार दिया। ब्रिटिश नागरिकों के विरोध से यह बिल कमजोर किया गया — इसने भारतीयों में राष्ट्रीय चेतना जगाई।"},
{q:"'मुंडा विद्रोह' (उलगुलान, 1899-1900) के नेता कौन थे?",o:["सिदो और कान्हू","बिरसा मुंडा","तिलका माँझी","अल्लूरी सीताराम राजू"],a:1,e:"बिरसा मुंडा ने 'उलगुलान' (महान हलचल) का नेतृत्व किया — झारखंड के मुंडा आदिवासियों ने जमींदारों और मिशनरियों के विरुद्ध विद्रोह किया। बिरसा को 'धरती अब्बा' कहा गया।"},
{q:"'भारत में प्रथम जनगणना' किस वर्ष हुई?",o:["1857","1872","1881","1891"],a:2,e:"1881 में भारत की पहली व्यापक, व्यवस्थित जनगणना हुई — यह नियमित दशकीय जनगणना का प्रारंभ था। 1872 में आंशिक प्रयास हुआ था।"},
{q:"'दक्षिण अफ्रीका' में गाँधीजी के संघर्ष (1893-1914) का भारतीय स्वतंत्रता आंदोलन पर क्या प्रभाव पड़ा?",o:["कोई प्रभाव नहीं","सत्याग्रह की तकनीक का विकास और परीक्षण हुआ जो बाद में भारत में अपनाई गई","दक्षिण अफ्रीका में भारतीय बस गए","अंग्रेजों से समझौता हुआ"],a:1,e:"दक्षिण अफ्रीका गाँधी की प्रयोगशाला थी — सत्याग्रह, अहिंसा, सविनय अवज्ञा यहीं परीक्षित हुईं। 1915 में भारत लौटने पर उन्होंने यही तकनीक राष्ट्रीय आंदोलन में लगाई।"},
{q:"'साइमन कमीशन' की रिपोर्ट (1930) का क्या महत्व था?",o:["इसने पूर्ण स्वतंत्रता की सिफारिश की","इसने प्रांतीय स्वायत्तता की सिफारिश की — जो बाद में 1935 के अधिनियम का आधार बनी","इसे तुरंत लागू किया गया","इसने मुस्लिम लीग का समर्थन किया"],a:1,e:"हालाँकि भारतीयों ने साइमन कमीशन का बहिष्कार किया, इसकी रिपोर्ट ने प्रांतीय स्वायत्तता की सिफारिश की जो भारत सरकार अधिनियम 1935 और अंततः 1950 के संविधान का आधार बनी।"},
{q:"'आनंदमठ' उपन्यास किसने लिखा और 'वंदे मातरम' गीत इसमें कैसे आया?",o:["रवींद्रनाथ टैगोर — उन्होंने अलग से लिखा","बंकिमचंद्र चट्टोपाध्याय — 'वंदे मातरम' इस उपन्यास का अंग था","सुरेंद्रनाथ बनर्जी — राजनीतिक भाषण में","बाल गंगाधर तिलक — केसरी में प्रकाशित"],a:1,e:"1882 में बंकिमचंद्र के उपन्यास 'आनंदमठ' में 'वंदे मातरम' गीत है। 1896 में कांग्रेस अधिवेशन में रवींद्रनाथ ने इसे गाया। यह राष्ट्रवाद का प्रतीक बन गया।"},
{q:"'भारत सरकार अधिनियम 1935' की सबसे महत्वपूर्ण विशेषता क्या थी?",o:["पूर्ण स्वतंत्रता","प्रांतीय स्वायत्तता — प्रांतों में भारतीय मंत्रिमंडल बने","केंद्र में भारतीय शासन","सांप्रदायिक निर्वाचन का अंत"],a:1,e:"1935 अधिनियम ने प्रांतों में द्विसदनीय विधायिका और उत्तरदायी सरकार दी। 1937 के चुनावों में कांग्रेस ने 11 में से 7 प्रांतों में सरकार बनाई। केंद्र में अभी भी ब्रिटिश नियंत्रण था।"},
{q:"'महात्मा गाँधी' के 'रामराज्य' की अवधारणा का क्या अर्थ था?",o:["हिंदू राष्ट्र की स्थापना","सत्य और न्याय पर आधारित आदर्श समाज — धर्म का राजनीतिक नहीं, नैतिक अर्थ","राम मंदिर का निर्माण","ब्राह्मण वर्चस्व"],a:1,e:"गाँधी के रामराज्य में धार्मिक अर्थ नहीं था — यह एक आदर्श लोकतांत्रिक समाज था जहाँ सत्य, न्याय और अहिंसा का शासन हो। अंबेडकर ने इस अवधारणा की आलोचना की।"},
{q:"'सुभाष चंद्र बोस' की मृत्यु के बारे में आधिकारिक रूप से क्या माना जाता है?",o:["वे भारत में छुपकर रहे","18 अगस्त 1945 को ताइवान में विमान दुर्घटना में मृत्यु","जापान में मृत्यु","सोवियत संघ में मृत्यु"],a:1,e:"आधिकारिक मत के अनुसार 18 अगस्त 1945 को ताइपे (ताइवान) में विमान दुर्घटना में बोस का निधन हुआ। हालाँकि इस पर विवाद और जाँच आयोग बनते रहे हैं।"},
{q:"'भारतीय राष्ट्रीय आंदोलन' में 'नरमपंथी' और 'गरमपंथी' के बीच मुख्य वैचारिक अंतर क्या था?",o:["हिंदू-मुस्लिम एकता","नरमपंथी संवैधानिक तरीकों से स्वशासन चाहते थे; गरमपंथी जन-आंदोलन और स्वदेशी से पूर्ण स्वराज","भाषायी आधार पर राज्य","सेना में सुधार"],a:1,e:"नरमपंथी (गोखले, दादाभाई) संवैधानिक अर्जियाँ, प्रार्थनाएँ और ब्रिटेन की न्यायप्रियता पर विश्वास रखते थे। गरमपंथी (तिलक, लाजपत राय) जन जागरण, स्वदेशी, और स्वराज के पक्षधर थे।"},
{q:"'संथाल विद्रोह' (1855-56) के नेता कौन थे और यह किसके विरुद्ध था?",o:["बिरसा मुंडा — ब्रिटिश के विरुद्ध","सिदो और कान्हू — जमींदारों, महाजनों और ब्रिटिश प्रशासन के विरुद्ध","तिलका माँझी — ईसाई मिशनरियों के विरुद्ध","रानी लक्ष्मीबाई — मुगलों के विरुद्ध"],a:1,e:"सिदो और कान्हू मुर्मू के नेतृत्व में संथाल जनजाति ने जमींदारों, साहूकारों और ब्रिटिश प्रशासन के शोषण के विरुद्ध विद्रोह किया — 'हुल' (क्रांति) का नारा लगाया।"},
{q:"'दादाभाई नौरोजी' के 'धन-निकास सिद्धांत' (Drain Theory) का मुख्य तर्क क्या था?",o:["भारत में सोने की कमी है","ब्रिटेन भारत के संसाधनों और धन को इस प्रकार निकाल रहा है जिसका भारत को कोई प्रतिफल नहीं मिलता","भारतीय व्यापारी ईमानदार नहीं","ब्रिटेन भारत की सहायता कर रहा है"],a:1,e:"नौरोजी ने 1867 में यह सिद्धांत दिया — गृह-व्यय (Home Charges), लाभांश, वेतन आदि के रूप में भारी धनराशि भारत से ब्रिटेन जाती है बिना किसी प्रतिफल के। यह भारत की गरीबी का मुख्य कारण था।"},
{q:"'चम्पारण सत्याग्रह' (1917) के बाद गाँधी ने कौन सा दूसरा सत्याग्रह किया?",o:["नमक सत्याग्रह","खेड़ा सत्याग्रह (1918) — किसान कर माफी के लिए","रॉलट सत्याग्रह","असहयोग आंदोलन"],a:1,e:"1918 में गुजरात के खेड़ा जिले में फसल नष्ट होने के बाद भी कर वसूली के विरुद्ध गाँधी और सरदार पटेल ने सत्याग्रह किया — यह पटेल का पहला बड़ा आंदोलन था।"},
{q:"'भारतीय सिविल सेवा' (ICS) में भारतीयों के प्रवेश के लिए किसने सबसे अधिक संघर्ष किया?",o:["दादाभाई नौरोजी — परीक्षा लंदन में न होकर भारत में भी हो","सुरेंद्रनाथ बनर्जी — जो खुद ICS से अन्यायपूर्वक बर्खास्त हुए","बाल गंगाधर तिलक","महात्मा गाँधी"],a:1,e:"सुरेंद्रनाथ बनर्जी ICS में थे पर नस्लीय भेदभाव से बर्खास्त हुए। उन्होंने 'इंडियन असोसिएशन' बनाकर ICS में भारतीयों की समान भागीदारी के लिए आंदोलन किया।"}
]},

geo:{title:"भूगोल",sub:"भौतिक, मानव एवं भारत का भूगोल — सेट 2",time:60,questions:[
{q:"'महाद्वीपीय विस्थापन सिद्धांत' किसने और कब प्रतिपादित किया? इसका मुख्य साक्ष्य क्या था?",o:["हेस — 1960 — समुद्री तल विस्तार","वेगनर — 1912 — महाद्वीपों की आकृतियाँ एवं जीवाश्मों की समानता","पेन्क — 1924 — पर्वत निर्माण","होम्स — 1931 — संवहन धाराएँ"],a:1,e:"अल्फ्रेड वेगनर ने 1912 में 'पैंजिया' (एक प्राचीन महाद्वीप) के विखंडन का सिद्धांत दिया। अफ्रीका-दक्षिण अमेरिका की समान तटरेखाएँ, एक जैसे जीवाश्म और चट्टानें इसके साक्ष्य थे।"},
{q:"'समुद्री तल विस्तार' (Sea Floor Spreading) सिद्धांत किसने दिया और इसने प्लेट विवर्तनिकी को कैसे समझाया?",o:["वेगनर — महाद्वीपों के खिसकने से","हैरी हेस — मध्य महासागरीय कटकों से नई भूपर्पटी बनती है","चार्ल्स डार्विन — प्रवाल द्वीप सिद्धांत","आर्थर होम्स — संवहन धाराओं से"],a:1,e:"हैरी हेस (1960) ने बताया कि मध्य महासागरीय कटकों (Mid-Ocean Ridges) से लावा निकलकर नई भूपर्पटी बनाता है — पुरानी प्लेट किनारों पर नीचे जाती है (subduction)। यही प्लेट विवर्तनिकी का आधार है।"},
{q:"'भूकंपीय तरंगें' दो प्रकार की होती हैं। P और S तरंगों में क्या अंतर है जो पृथ्वी की आंतरिक संरचना जानने में सहायक है?",o:["P तरंगें तेज, S तरंगें धीमी — दोनों सभी माध्यमों में चलती हैं","P तरंगें सभी माध्यमों में, S तरंगें केवल ठोस में — इससे द्रव बाहरी क्रोड की पुष्टि हुई","दोनों समान गति से चलती हैं","S तरंगें P से तेज हैं"],a:1,e:"P (Primary) तरंगें ठोस, द्रव, गैस सभी में चलती हैं। S (Secondary) तरंगें केवल ठोस में। S तरंगें बाहरी क्रोड से नहीं गुजरतीं — इससे पुष्टि हुई कि बाहरी क्रोड द्रव अवस्था में है।"},
{q:"'वायुमंडल की परतें' क्षोभमंडल से बाह्यमंडल तक क्रमशः हैं। मौसम की घटनाएँ किस परत में होती हैं और क्यों?",o:["समतापमंडल — ओजोन के कारण","क्षोभमंडल — जलवाष्प, धूल और ऊर्ध्वाधर वायु-संचरण यहाँ होता है","मध्यमंडल — तापमान सबसे कम","आयनमंडल — विद्युत-चुंबकीय"],a:1,e:"क्षोभमंडल (0-12 किमी) में जलवाष्प और धूल कण होते हैं, ऊर्ध्वाधर वायु संचलन होता है — इसीलिए बादल, वर्षा, तूफान सब यहीं होते हैं। ऊँचाई बढ़ने के साथ तापमान घटता है।"},
{q:"'मानसून' की उत्पत्ति के संदर्भ में 'ITCZ' (Inter Tropical Convergence Zone) का क्या महत्व है?",o:["यह ध्रुवीय हवाओं का क्षेत्र है","यह वह क्षेत्र है जहाँ उत्तर-पूर्व और दक्षिण-पूर्व व्यापारिक हवाएँ मिलती हैं — इसके खिसकने से मानसून आता है","यह समुद्री धारा है","यह ओजोन से संबंधित है"],a:1,e:"ITCZ वह भूमध्यरेखीय निम्न वायुदाब पेटी है जहाँ दोनों गोलार्धों की व्यापारिक हवाएँ मिलती हैं। गर्मियों में यह उत्तर की ओर खिसककर भारत के ऊपर आ जाती है — इससे मानसून प्रवेश करता है।"},
{q:"'पश्चिमी घाट' और 'पूर्वी घाट' में क्या मुख्य अंतर हैं?",o:["दोनों समान ऊँचाई के हैं","पश्चिमी घाट अविच्छिन्न और ऊँचा है; पूर्वी घाट विच्छिन्न और निचला — पश्चिमी घाट पर अधिक वर्षा","पूर्वी घाट अधिक ऊँचा है","दोनों समान दिशा में हैं"],a:1,e:"पश्चिमी घाट (900-1500 मीटर) अरब सागर की नम हवाएँ रोककर भारी वर्षा कराता है। पूर्वी घाट (600 मीटर) बाधित और कम ऊँचा है — कम वर्षा होती है।"},
{q:"'नदी अपहरण' (River Capture/Piracy) क्या है?",o:["नदी का बाँध बनाना","एक नदी का अपने अपरदन से दूसरी नदी की सहायक नदी को अपने में मिला लेना","नदी का दिशा परिवर्तन","नदी का डेल्टा बनाना"],a:1,e:"जब कोई नदी अपनी घाटी का विस्तार करते हुए जल-विभाजक को काटकर दूसरी नदी की धारा को अपनी ओर मोड़ लेती है — इसे नदी अपहरण कहते हैं। हिमालयी नदियाँ इसका उदाहरण हैं।"},
{q:"'भारत में वर्षा वितरण' इतना असमान क्यों है? निम्न में से कौन सा कारण सही नहीं है?",o:["मानसून की अरब सागर और बंगाल की खाड़ी शाखाएँ","पहाड़ों की दिशा और ऊँचाई","भूमध्यरेखा से दूरी","समुद्र से दूरी"],a:2,e:"वर्षा वितरण में मानसून की दो शाखाएँ, पहाड़ों की दिशा, समुद्र से दूरी और वृष्टि छाया क्षेत्र महत्वपूर्ण हैं। भूमध्यरेखा से दूरी भारत में वर्षा वितरण का प्रमुख कारण नहीं है।"},
{q:"'भारत की जनगणना 2011' के अनुसार सबसे कम जनसंख्या घनत्व वाला राज्य कौन सा है?",o:["मिजोरम","नागालैंड","अरुणाचल प्रदेश","सिक्किम"],a:2,e:"अरुणाचल प्रदेश का जनसंख्या घनत्व 2011 में मात्र 17 व्यक्ति प्रति वर्ग किमी था — विशाल क्षेत्रफल और कम जनसंख्या के कारण।"},
{q:"'नगरीकरण के कारण' भारत में 'ऊष्मा द्वीप प्रभाव' (Urban Heat Island) क्यों होता है?",o:["शहरों में अधिक वृक्ष हैं","कंक्रीट, डामर और कम हरियाली से ऊष्मा अवशोषण अधिक — शहर ग्रामीण क्षेत्रों से 2-5°C गर्म रहते हैं","शहरों में अधिक वर्षा होती है","शहरों में अधिक हवा चलती है"],a:1,e:"कंक्रीट और डामर सूर्य की ऊर्जा अवशोषित करते हैं, हरियाली कम होती है, वाहनों और उद्योगों से ऊष्मा निकलती है — इससे शहरी क्षेत्र आसपास से अधिक गर्म रहते हैं।"},
{q:"'भारत में खनिज वितरण' के संदर्भ में 'छोटानागपुर पठार' को 'भारत का रुहर' क्यों कहते हैं?",o:["यह कृषि के लिए प्रसिद्ध है","यहाँ कोयला, लोहा, मैंगनीज, बॉक्साइट और अभ्रक की प्रचुर खदानें हैं — जर्मनी के रुहर जैसी खनिज सम्पदा","यह पर्यटन केंद्र है","यह जल विद्युत का केंद्र है"],a:1,e:"झारखंड का छोटानागपुर पठार भारत का सबसे खनिज-समृद्ध क्षेत्र है — कोयला, लोहा, मैंगनीज, तांबा, अभ्रक। जर्मनी का रुहर भी खनिज-औद्योगिक क्षेत्र है — इसीलिए यह उपनाम।"},
{q:"'समुद्री धाराएँ' जलवायु को कैसे प्रभावित करती हैं? उदाहरण दें।",o:["कोई प्रभाव नहीं","गर्म धाराएँ तटीय क्षेत्रों को गर्म और आर्द्र, ठंडी धाराएँ शुष्क — जैसे खाड़ी धारा उत्तर-पश्चिम यूरोप को गर्म रखती है","धाराएँ केवल मछुआरों को प्रभावित करती हैं","ठंडी धाराएँ तूफान लाती हैं"],a:1,e:"खाड़ी धारा (Gulf Stream) उत्तर-पश्चिमी यूरोप को उसकी अक्षांशीय स्थिति से अधिक गर्म रखती है। लेब्राडोर ठंडी धारा से कनाडा के पूर्वी तट पर कोहरा होता है।"},
{q:"'अंतर्राष्ट्रीय प्रवसन' के 'पुश और पुल कारक' क्या हैं?",o:["पुश = रोजगार, पुल = बेरोजगारी","पुश = मूल स्थान से दूर धकेलने वाले (गरीबी, युद्ध); पुल = गंतव्य की ओर खींचने वाले (रोजगार, सुरक्षा)","दोनों समान हैं","पुश = धार्मिक, पुल = आर्थिक"],a:1,e:"पुश कारक मूल स्थान की नकारात्मक स्थितियाँ हैं (बेरोजगारी, युद्ध, अकाल) जो व्यक्ति को वहाँ से हटाते हैं। पुल कारक गंतव्य की सकारात्मक स्थितियाँ हैं (रोजगार, शांति) जो आकर्षित करती हैं।"},
{q:"'भारत में कृषि की समस्याएँ' के संदर्भ में 'छिपी हुई बेरोजगारी' (Disguised Unemployment) का क्या अर्थ है?",o:["किसान काम करते दिखते हैं पर हैं नहीं","खेतों में आवश्यकता से अधिक श्रमिक लगे हैं — उनमें से कुछ को हटाने पर उत्पादन नहीं घटता","मौसमी बेरोजगारी","शहरी बेरोजगारी"],a:1,e:"भारतीय कृषि में परिवार के सभी सदस्य खेत पर काम करते हैं पर सीमांत उत्पाद शून्य है — अगर कुछ हट जाएँ तो उत्पादन वही रहेगा। यही छिपी हुई बेरोजगारी है।"},
{q:"'भारत में जल संकट' का मुख्य कारण क्या है?",o:["वर्षा बहुत कम है","मानसून की अनिश्चितता, असमान वितरण, अत्यधिक भूजल दोहन, और प्रदूषण","नदियाँ विदेश में बहती हैं","जनसंख्या कम है"],a:1,e:"भारत में वर्षा का 70% तीन महीने में होती है पर भंडारण क्षमता सीमित है। पंजाब-हरियाणा में भूजल खतरनाक स्तर पर घट रहा है। नदियों का औद्योगिक प्रदूषण भी बड़ी समस्या है।"},
{q:"'भारत में वनों के प्रकार' में 'उष्णकटिबंधीय पर्णपाती वन' (Tropical Deciduous) की विशेषता क्या है?",o:["ये वर्षभर हरे रहते हैं","ये ग्रीष्म में पत्ते गिराते हैं — 75-200 सेमी वर्षा वाले क्षेत्र में — सागौन, साल प्रमुख वृक्ष","ये केवल पहाड़ों पर हैं","ये केवल तटीय क्षेत्रों में हैं"],a:1,e:"उष्णकटिबंधीय पर्णपाती वन (Monsoon Forests) भारत के सर्वाधिक क्षेत्र में फैले हैं। ग्रीष्म में पत्ते गिरते हैं — सागौन (MP, Maharashtra) और साल (Jharkhand) प्रमुख व्यापारिक वृक्ष हैं।"},
{q:"'भारत में परिवहन' के संदर्भ में 'स्वर्णिम चतुर्भुज परियोजना' क्या है?",o:["चार धाम यात्रा मार्ग","दिल्ली-मुंबई-चेन्नई-कोलकाता को जोड़ने वाला राजमार्ग नेटवर्क","चार बंदरगाहों को जोड़ने वाला जलमार्ग","चार रेलवे जोन"],a:1,e:"स्वर्णिम चतुर्भुज (Golden Quadrilateral) भारत के चार महानगरों को जोड़ने वाला 5,846 किमी लंबा 4-6 लेन राजमार्ग है — यह NHDP का पहला चरण था।"},
{q:"'भारत में ऊर्जा संसाधन' के संदर्भ में 'नवीकरणीय ऊर्जा' में भारत की सबसे बड़ी क्षमता किसमें है?",o:["जल विद्युत","परमाणु ऊर्जा","सौर ऊर्जा — राजस्थान और गुजरात के मरुस्थलीय क्षेत्र","ज्वारीय ऊर्जा"],a:2,e:"भारत में 300+ दिन सूर्य प्रकाश और विशाल भूमि — सौर ऊर्जा की अपार क्षमता है। राजस्थान (थार) और गुजरात में बड़े सौर पार्क हैं। भारत 2030 तक 500 GW नवीकरणीय ऊर्जा का लक्ष्य रखता है।"},
{q:"'जनसांख्यिकीय लाभांश' (Demographic Dividend) से भारत को क्या लाभ हो सकता है?",o:["अधिक वृद्ध जनसंख्या से अनुभव","युवा कार्यशील जनसंख्या से अधिक उत्पादन, बचत और आर्थिक वृद्धि — यदि रोजगार और कौशल मिले","जनसंख्या वृद्धि से स्वतः विकास","आयात में कमी"],a:1,e:"जब किसी देश में कामकाजी आयु (15-64) की जनसंख्या अनुपात में अधिक होती है — उत्पादन, बचत और उपभोग बढ़ता है। भारत की 65% जनसंख्या 35 वर्ष से कम है — यही लाभांश है, पर कौशल विकास जरूरी है।"},
{q:"'ग्लेशियर' के पिघलने से हिमालयी नदियों पर क्या दीर्घकालिक प्रभाव होगा?",o:["नदियाँ सदा बहती रहेंगी","अल्पावधि में जल वृद्धि, दीर्घावधि में जल संकट — ग्लेशियर खत्म होने पर ग्रीष्मकालीन जल प्रवाह घटेगा","कोई प्रभाव नहीं","नदियाँ नए मार्ग बनाएंगी"],a:1,e:"ग्लोबल वार्मिंग से हिमालयी ग्लेशियर तेज गति से पिघल रहे हैं। अल्पावधि में बाढ़ (GLOF), दीर्घावधि में ग्रीष्म में जल प्रवाह घटेगा — गंगा, यमुना, ब्रह्मपुत्र पर निर्भर करोड़ों के लिए संकट।"},
{q:"'भारत में कृषि' के संदर्भ में 'रबी और खरीफ फसलों' में अंतर बताइए।",o:["दोनों एक साथ बोई जाती हैं","रबी शीत में बोई-ग्रीष्म में काटी (गेहूँ, सरसों); खरीफ मानसून में बोई-शरद में काटी (धान, मक्का)","रबी केवल दक्षिण में, खरीफ उत्तर में","दोनों समान फसलें हैं"],a:1,e:"रबी (Winter crop): अक्टूबर-नवंबर में बोई, मार्च-अप्रैल में काटी — गेहूँ, जौ, सरसों, चना। खरीफ (Summer/Monsoon crop): जून-जुलाई में बोई, सितंबर-अक्टूबर में काटी — धान, मक्का, कपास, सोयाबीन।"},
{q:"'भारत में आपदा प्रबंधन' के संदर्भ में 'NDMA' क्या है?",o:["राष्ट्रीय रक्षा मंत्रालय अधिकरण","राष्ट्रीय आपदा प्रबंधन प्राधिकरण — 2005 में स्थापित, प्रधानमंत्री अध्यक्ष","राष्ट्रीय डेटा प्रबंधन एजेंसी","उत्तरी दिल्ली नगर निगम"],a:1,e:"NDMA (National Disaster Management Authority) 2005 में आपदा प्रबंधन अधिनियम द्वारा स्थापित — प्रधानमंत्री इसके अध्यक्ष हैं। भूकंप, बाढ़, चक्रवात जैसी आपदाओं की नीति और समन्वय इसका कार्य है।"},
{q:"'उष्णकटिबंधीय चक्रवात' भारत के किस तट पर अधिक आते हैं और क्यों?",o:["पश्चिमी तट — अरब सागर से","पूर्वी तट — बंगाल की खाड़ी अधिक गर्म और बंद, इसलिए अधिक चक्रवात","दोनों तट समान","उत्तरी तट"],a:1,e:"बंगाल की खाड़ी उथली, बंद और गर्म है — अधिक वाष्पीकरण से चक्रवात तीव्र होते हैं। भारत के 80% चक्रवात पूर्वी तट (आंध्र, ओडिशा, तमिलनाडु) पर आते हैं।"},
{q:"'विश्व में जनसंख्या वितरण' इतना असमान क्यों है?",o:["राजनीतिक कारण","भौतिक (जलवायु, उच्चावच, मिट्टी), आर्थिक (उद्योग, रोजगार) और सामाजिक-ऐतिहासिक कारण","धार्मिक कारण","केवल तापमान"],a:1,e:"उपजाऊ नदी घाटियाँ (गंगा, नील, यांग्त्सी) घनी आबादी वाली हैं। मरुस्थल, ध्रुवीय प्रदेश, पहाड़ विरल। औद्योगिक क्षेत्र भी आकर्षक हैं — भौतिक, आर्थिक और ऐतिहासिक कारक मिलकर असमानता पैदा करते हैं।"},
{q:"'भारत में सिंचाई के साधन' में 'नहर सिंचाई' का सर्वाधिक विस्तार किस क्षेत्र में है?",o:["दक्कन पठार","पश्चिमी राजस्थान","उत्तर भारत का मैदान — उत्तर प्रदेश, पंजाब, हरियाणा","उत्तर-पूर्व भारत"],a:2,e:"उत्तर भारत के मैदानी राज्यों (UP, Punjab, Haryana) में नहर सिंचाई सर्वाधिक है — यमुना, गंगा, सतलुज नदियों से नहरें निकाली गई हैं। दक्षिण में कुएँ और तालाब अधिक हैं।"},
{q:"'मानसून के प्रत्यावर्तन' (Retreating Monsoon) के दौरान कहाँ वर्षा होती है?",o:["पश्चिमी भारत","पूर्वी तट (आंध्र, तमिलनाडु) — बंगाल की खाड़ी से चक्रवाती वर्षा","उत्तर भारत","पश्चिम राजस्थान"],a:1,e:"अक्टूबर-नवंबर में मानसून वापस जाता है। इस दौरान बंगाल की खाड़ी में चक्रवात बनते हैं जो पूर्वी तट पर भारी वर्षा करते हैं — तमिलनाडु को इसी से अधिकांश वर्षा मिलती है।"},
{q:"'भारत में ग्रामीण-नगरीय प्रवसन' के क्या परिणाम होते हैं?",o:["केवल सकारात्मक","गाँव: श्रम शक्ति कमी, कृषि प्रभावित; शहर: झुग्गियाँ, अवसंरचना पर दबाव — पर प्रेषण (Remittances) से गाँव में आय","कोई प्रभाव नहीं","केवल शहरों में समस्याएँ"],a:1,e:"ग्रामीण-नगरीय प्रवसन से गाँवों में कुशल श्रमिकों की कमी और कृषि प्रभावित होती है। शहरों में झुग्गियाँ और अवसंरचना पर दबाव बढ़ता है। हालाँकि प्रवासी घर पैसे भेजते हैं जिससे ग्रामीण आय बढ़ती है।"},
{q:"'भारत के प्रमुख उद्योगों' में 'सूती वस्त्र उद्योग' महाराष्ट्र और गुजरात में क्यों केंद्रित है?",o:["यहाँ कोयला प्रचुर है","काली मिट्टी में कपास उत्पादन, बंदरगाहों की निकटता, आर्द्र जलवायु और पूँजी उपलब्धता","यहाँ सस्ता श्रम है","यहाँ विद्युत सस्ती है"],a:1,e:"महाराष्ट्र-गुजरात में काली मिट्टी से कपास उत्पादन, मुंबई-सूरत बंदरगाह (आयात-निर्यात), आर्द्र जलवायु (धागा नहीं टूटता) और मारवाड़ी-पारसी पूँजीपतियों की उपस्थिति — सभी अनुकूल।"},
{q:"'टाइगा वन' (Boreal Forest) कहाँ और किस जलवायु में पाए जाते हैं?",o:["उष्णकटिबंधीय — 25°C तापमान","साइबेरिया, कनाडा — उपध्रुवीय जलवायु में, -40°C से +20°C तापमान — चीड़, स्प्रूस, फर","भूमध्यसागरीय क्षेत्र","मानसून क्षेत्र"],a:1,e:"टाइगा विश्व का सबसे बड़ा वन क्षेत्र है — रूस, कनाडा, स्कैंडिनेविया में। अत्यंत ठंडी और लंबी सर्दियाँ — केवल शंकुधारी वृक्ष (Pine, Spruce, Fir) ही टिक सकते हैं।"},
{q:"'प्रवाल भित्तियाँ' (Coral Reefs) खतरे में क्यों हैं?",o:["मछुआरों के जाल से","समुद्री जल तापमान वृद्धि से 'प्रवाल विरंजन' (Bleaching), अम्लीकरण और प्रदूषण","ज्वार-भाटा से","समुद्री तूफान से"],a:1,e:"समुद्री तापमान 1°C बढ़ने पर प्रवाल अपने सहजीवी शैवाल (zooxanthellae) छोड़ देता है — सफेद (bleached) हो जाता है। CO₂ से समुद्र का अम्लीकरण भी प्रवाल के कैल्शियम कार्बोनेट ढाँचे को नष्ट करता है।"},
{q:"'भारत में पर्यटन' के संदर्भ में 'सांस्कृतिक पर्यटन' और 'पारिस्थितिकी पर्यटन' (Ecotourism) में क्या अंतर है?",o:["दोनों समान हैं","सांस्कृतिक पर्यटन — विरासत, मंदिर, त्योहार; Ecotourism — प्राकृतिक क्षेत्र जहाँ पर्यावरण संरक्षण और स्थानीय समुदाय लाभान्वित हों","Ecotourism केवल विदेशियों के लिए","सांस्कृतिक पर्यटन महँगा है"],a:1,e:"Ecotourism वह है जो प्राकृतिक क्षेत्रों में टिकाऊ तरीके से हो — स्थानीय पर्यावरण और समुदाय दोनों को लाभ। केरल के बैकवाटर, उत्तराखंड के जंगल Ecotourism के उदाहरण हैं।"},
{q:"'तटीय प्रबंधन' के संदर्भ में 'CRZ' (Coastal Regulation Zone) क्या है?",o:["तटीय रक्षा क्षेत्र — सेना के लिए","तट से निश्चित दूरी तक निर्माण और औद्योगिक गतिविधियों को नियंत्रित करने वाला नियम","मछुआरों का पंजीकरण","बंदरगाह विकास योजना"],a:1,e:"CRZ (1991, संशोधित 2019) उच्च जल रेखा से 500 मीटर तक निर्माण और प्रदूषणकारी उद्योगों पर प्रतिबंध लगाता है — तटीय पारिस्थितिकी और मछुआरों की आजीविका की रक्षा के लिए।"},
{q:"'भारत में खाद्य सुरक्षा' के संदर्भ में 'PDS' (Public Distribution System) की क्या भूमिका है?",o:["कृषि उत्पादन बढ़ाना","सब्सिडाइज्ड खाद्यान्न गरीब परिवारों तक पहुँचाना — FCI के भंडार से राशन की दुकानों तक","निर्यात नीति","कृषि ऋण"],a:1,e:"PDS के तहत FCI (Food Corporation of India) गेहूँ और चावल खरीदकर भंडारित करती है। 'उचित मूल्य दुकानों' (राशन की दुकान) से गरीब परिवारों को सस्ते में अनाज मिलता है।"},
{q:"'विश्व के मरुस्थल' क्यों 30° उत्तर और दक्षिण अक्षांशों के आसपास अधिक हैं?",o:["यहाँ समुद्र दूर है","उपोष्ण उच्च वायुदाब पेटी में वायु अवतलन होता है — नमी नहीं बन पाती","यहाँ तापमान बहुत अधिक है","पर्वत वर्षा रोकते हैं"],a:1,e:"30° अक्षांश पर उपोष्ण उच्च वायुदाब पेटी में ऊपर से नीचे उतरती (अवतलन) हवा गर्म और शुष्क हो जाती है — बादल नहीं बन सकते, वर्षा नहीं होती। इसीलिए सहारा, अरब, थार, ऑस्ट्रेलियाई मरुस्थल यहीं हैं।"},
{q:"'भारत में मृदा अपरदन' के मुख्य कारण और उपाय क्या हैं?",o:["केवल भूकंप","वनोन्मूलन, अतिचराई, गलत कृषि; उपाय — वनरोपण, सोपान खेती, चेक डैम","केवल वर्षा","केवल औद्योगिक प्रदूषण"],a:1,e:"भारत प्रतिवर्ष 5.3 अरब टन मिट्टी खोता है। वनोन्मूलन से जड़ें नहीं, वर्षा जल तेज बहता है। सोपान खेती (Terracing), मेड़बंदी, वनरोपण और बूँद-बूँद सिंचाई उपाय हैं।"},
{q:"'भारत में जनजातीय जनसंख्या' (Scheduled Tribes) सर्वाधिक किस राज्य में है?",o:["झारखंड","छत्तीसगढ़","मध्य प्रदेश","ओडिशा"],a:2,e:"मध्य प्रदेश में जनजातीय जनसंख्या (2011 में 1.53 करोड़) सर्वाधिक है। प्रतिशत में मिजोरम (94%) सबसे ऊपर है।"},
{q:"'प्रशांत अग्नि वलय' (Ring of Fire) क्या है?",o:["प्रशांत महासागर में मछली पकड़ने का क्षेत्र","प्रशांत महासागर के चारों ओर भूकंप और ज्वालामुखी की पेटी — यहाँ 75% ज्वालामुखी","प्रशांत में एक महासागरीय धारा","एक पर्यावरण संधि"],a:1,e:"Ring of Fire प्रशांत महासागर के किनारे 40,000 किमी में फैली ज्वालामुखी और भूकंप की पेटी है — जापान, फिलीपींस, इंडोनेशिया, अलास्का, एंडीज यहाँ हैं।"},
{q:"'भारत में खनिज ईंधन' के संदर्भ में 'कोयला वितरण' कहाँ सर्वाधिक है?",o:["राजस्थान","गोंडवाना क्षेत्र — झारखंड, पश्चिम बंगाल, छत्तीसगढ़, ओडिशा","पंजाब-हरियाणा","गुजरात"],a:1,e:"भारत का 98% कोयला गोंडवाना शैल क्षेत्र में है — झारखंड (झरिया, बोकारो), पश्चिम बंगाल (रानीगंज), छत्तीसगढ़ (कोरबा), ओडिशा (तलचर) प्रमुख क्षेत्र हैं।"},
{q:"'भूमंडलीकरण' (Globalisation) का विकासशील देशों के कृषि पर क्या प्रभाव पड़ा?",o:["केवल लाभ — कीमतें बढ़ीं","मिश्रित प्रभाव — निर्यात के अवसर मिले पर सस्ते आयातित उत्पादों से स्थानीय किसान प्रभावित हुए","कोई प्रभाव नहीं","केवल हानि"],a:1,e:"भूमंडलीकरण से निर्यातोन्मुखी फसलें (फूल, सब्जी, फल) लाभदायक हुईं। पर WTO के बाद सब्सिडी कम होने और सस्ते विदेशी उत्पाद आने से छोटे किसान प्रभावित हुए।"},
{q:"'भारत की जनसंख्या नीति 2000' का मुख्य लक्ष्य क्या था?",o:["जनसंख्या वृद्धि प्रोत्साहन","2045 तक जनसंख्या स्थिरीकरण — TFR को 2.1 (प्रतिस्थापन स्तर) तक लाना","एक बच्चे की नीति","विदेशी प्रवसन रोकना"],a:1,e:"राष्ट्रीय जनसंख्या नीति 2000 का लक्ष्य था 2010 तक TFR 2.1 प्राप्त करना और 2045 तक जनसंख्या स्थिरीकरण — स्वास्थ्य सेवाएँ, शिक्षा और महिला सशक्तीकरण इसके साधन थे।"}
]},

pol:{title:"राजनीति विज्ञान",sub:"भारतीय संविधान, शासन एवं अंतर्राष्ट्रीय संबंध — सेट 2",time:60,questions:[
{q:"'संविधान के स्रोत' के संदर्भ में भारत ने 'न्यायिक समीक्षा' किस देश से ली?",o:["ब्रिटेन","अमेरिका","आयरलैंड","ऑस्ट्रेलिया"],a:1,e:"न्यायिक समीक्षा (Judicial Review) अमेरिकी संविधान की देन है — भारत ने इसे अपनाया, पर अमेरिका से कम व्यापक रूप में। भारत में संसद के कानूनों को असंवैधानिक घोषित किया जा सकता है।"},
{q:"'लोकसभा अध्यक्ष' (Speaker) की भूमिका और शक्तियाँ क्या हैं?",o:["वे सदन में मतदान करते हैं","वे सदन की कार्यवाही नियंत्रित करते हैं, सदस्यों की अयोग्यता (दल-बदल) पर निर्णय लेते हैं और निर्णायक मत देते हैं","वे प्रधानमंत्री की नियुक्ति करते हैं","वे राष्ट्रपति का प्रतिनिधित्व करते हैं"],a:1,e:"लोकसभा अध्यक्ष — सदन की अध्यक्षता, कार्यवाही नियंत्रण, दल-बदल कानून के तहत अयोग्यता निर्णय, बराबरी पर निर्णायक मत। वे निर्दलीय रूप से कार्य करते हैं।"},
{q:"'राज्य के नीति निदेशक तत्वों' (DPSP) में 'गांधीवादी सिद्धांत' के अंतर्गत क्या आता है?",o:["समान कार्य के लिए समान वेतन","ग्राम पंचायतों का संगठन, कुटीर उद्योग, मादक पदार्थ निषेध","शिक्षा का अधिकार","न्यायपालिका की स्वतंत्रता"],a:1,e:"गांधीवादी सिद्धांत (अनु. 40-48): पंचायतों का गठन (40), कुटीर उद्योग (43), मादक पदार्थ निषेध (47), गाय-भैंस वध निषेध (48), आदि — ये सब गाँधी की ग्रामीण अर्थव्यवस्था दृष्टि से प्रेरित हैं।"},
{q:"'भारत में आपातकाल' (1975-77) के दौरान क्या हुआ जो संविधानिक संकट का उदाहरण बना?",o:["राष्ट्रपति ने प्रधानमंत्री को हटाया","42वें संशोधन से मूल संरचना पर प्रहार, प्रेस सेंसरशिप, और मौलिक अधिकार निलंबित किए गए","संसद भंग हो गई","सेना ने शासन संभाला"],a:1,e:"1975-77 की आपातकाल में प्रेस सेंसरशिप, 19 महीने का मौलिक अधिकार निलंबन, और 42वें संशोधन से न्यायिक समीक्षा सीमित की गई — इसे 'भारतीय लोकतंत्र का सबसे काला अध्याय' कहा जाता है।"},
{q:"'सहकारी संघवाद' (Cooperative Federalism) की अवधारणा क्या है?",o:["केंद्र राज्यों पर नियंत्रण करे","केंद्र और राज्य प्रतिस्पर्धी नहीं — साझेदार के रूप में मिलकर राष्ट्रीय लक्ष्य प्राप्त करें","राज्य पूर्ण स्वायत्त हों","केवल आर्थिक सहयोग"],a:1,e:"NITI Aayog, GST Council, और Inter-State Council सहकारी संघवाद के उदाहरण हैं — केंद्र और राज्य एक-दूसरे को प्रतिद्वंद्वी नहीं, सहयोगी मानकर नीतियाँ बनाते हैं।"},
{q:"'अनुच्छेद 21' की व्याख्या सर्वोच्च न्यायालय ने किस वाद में विस्तृत की?",o:["A.K. Gopalan बनाम मद्रास राज्य (1950)","मेनका गाँधी बनाम भारत संघ (1978)","केशवानंद भारती बनाम केरल","ADM जबलपुर बनाम शिवकांत शुक्ला"],a:1,e:"मेनका गाँधी वाद (1978) में सर्वोच्च न्यायालय ने कहा कि अनु. 21 में 'प्रक्रिया' उचित और न्यायसंगत होनी चाहिए (न कि केवल विधिक) — इसने अनु. 21 को जीवन के अधिकार का व्यापक अर्थ दिया।"},
{q:"'भारत में राजनीतिक दल' के संदर्भ में 'राष्ट्रीय दल' का दर्जा कब मिलता है?",o:["100 सांसद होने पर","4 या अधिक राज्यों में 6% मत + 4 लोकसभा सीटें OR 4 राज्यों में मान्यता प्राप्त राज्य दल","10 वर्ष पुराना दल होना","केवल केंद्र में सत्तारूढ़ दल"],a:1,e:"ECI के नियमानुसार — चार राज्यों में कम से कम 6% मत + 4 लोकसभा सीटें, या चार राज्यों में मान्यता प्राप्त राज्य दल होने पर राष्ट्रीय दल का दर्जा मिलता है।"},
{q:"'भारत में न्यायाधीशों की नियुक्ति' में 'कॉलेजियम प्रणाली' क्या है?",o:["संसद न्यायाधीश चुनती है","सर्वोच्च न्यायालय के वरिष्ठ न्यायाधीशों का समूह (CJI + 4 वरिष्ठ) न्यायाधीशों की नियुक्ति/तबादला तय करता है","राष्ट्रपति सीधे नियुक्त करते हैं","न्याय मंत्रालय तय करता है"],a:1,e:"कॉलेजियम प्रणाली तीन जजों के वाद (1981, 1993, 1998) से विकसित हुई — CJI और 4 वरिष्ठतम न्यायाधीश नाम तय करते हैं। NJAC (2014) को सर्वोच्च न्यायालय ने 2015 में असंवैधानिक घोषित किया।"},
{q:"'प्रश्नकाल' (Question Hour) और 'शून्यकाल' (Zero Hour) में क्या अंतर है?",o:["दोनों समान हैं","प्रश्नकाल — संविधानिक, पहले घंटे में मंत्रियों से प्रश्न; शून्यकाल — असंविधानिक परंपरा, 12 बजे से अत्यावश्यक मुद्दे बिना पूर्व सूचना","शून्यकाल में केवल बजट पर बहस","प्रश्नकाल राज्यसभा में नहीं होता"],a:1,e:"प्रश्नकाल (प्रश्न + तारांकित/अतारांकित) संविधानिक है — पहले घंटे में। शून्यकाल भारत की अनूठी संसदीय परंपरा है — 12 बजे से अचानक उठाए जाने वाले अत्यावश्यक जन-हित मुद्दे।"},
{q:"'राज्य विधानसभा' के सदस्य बनने के लिए न्यूनतम आयु कितनी है?",o:["18 वर्ष","21 वर्ष","25 वर्ष","30 वर्ष"],a:2,e:"राज्य विधानसभा सदस्य के लिए न्यूनतम 25 वर्ष आयु — लोकसभा के समान। राज्यसभा और विधान परिषद के लिए 30 वर्ष।"},
{q:"'अनुच्छेद 360' (वित्तीय आपातकाल) कितनी बार लागू हुआ?",o:["एक बार — 1962","दो बार — 1971, 1991","तीन बार","कभी नहीं"],a:3,e:"भारत में अनुच्छेद 360 के तहत वित्तीय आपातकाल आज तक कभी नहीं लगाया गया। तीन राष्ट्रीय आपातकाल (1962, 1971, 1975) और कई बार राष्ट्रपति शासन (अनु. 356) लगे हैं।"},
{q:"'संसदीय समितियाँ' (Parliamentary Committees) क्यों महत्वपूर्ण हैं?",o:["वे कानून बनाती हैं","विधेयकों की विस्तृत जाँच, सरकारी व्यय की निगरानी — PAC, Estimates Committee आदि","वे न्यायिक कार्य करती हैं","वे चुनाव कराती हैं"],a:1,e:"लोकसभा/राज्यसभा की 24 विभागीय समितियाँ विधेयकों पर विशेषज्ञ जाँच करती हैं। PAC (Public Accounts Committee) — CAG रिपोर्ट के आधार पर सरकारी व्यय की निगरानी — सबसे महत्वपूर्ण है।"},
{q:"'भारत में संघीय विवाद' के संदर्भ में 'अंतरराज्यीय परिषद' (Inter-State Council) किस अनुच्छेद के तहत है?",o:["अनुच्छेद 263","अनुच्छेद 280","अनुच्छेद 312","अनुच्छेद 352"],a:0,e:"अनुच्छेद 263 के तहत राष्ट्रपति अंतरराज्यीय परिषद स्थापित कर सकते हैं। इसकी स्थापना 1990 में हुई — प्रधानमंत्री अध्यक्ष, सभी मुख्यमंत्री सदस्य। केंद्र-राज्य विवाद सुलझाने का मंच।"},
{q:"'चुनाव सुधार' के संदर्भ में 'EVM' को लेकर क्या मुख्य विवाद रहे हैं और सर्वोच्च न्यायालय ने क्या कहा?",o:["EVM असंवैधानिक घोषित","EVM से छेड़छाड़ के आरोप — सर्वोच्च न्यायालय ने 2024 में VVPAT की 100% मिलान याचिका अस्वीकार की","EVM पर प्रतिबंध","EVM केवल राज्य चुनावों में"],a:1,e:"EVM की विश्वसनीयता पर विपक्ष प्रश्न उठाता रहा है। 2024 में सर्वोच्च न्यायालय ने VVPAT की 100% मिलान की माँग अस्वीकार करते हुए EVM प्रणाली को विश्वसनीय माना।"},
{q:"'राष्ट्रीय मानवाधिकार आयोग' (NHRC) का गठन किस अधिनियम के तहत हुआ?",o:["संविधान के अनुच्छेद 32","मानव अधिकार संरक्षण अधिनियम 1993","RTI Act 2005","CAG अधिनियम"],a:1,e:"NHRC की स्थापना मानव अधिकार संरक्षण अधिनियम 1993 के तहत हुई। इसके अध्यक्ष सर्वोच्च न्यायालय के पूर्व मुख्य न्यायाधीश होते हैं। यह सरकारी मानवाधिकार उल्लंघन की जाँच कर सकता है।"},
{q:"'शहरी स्थानीय निकाय' (74वाँ संशोधन) में 'वार्ड समिति' का क्या प्रावधान है?",o:["केवल बड़े शहरों में नहीं","3 लाख से अधिक जनसंख्या के नगरपालिका क्षेत्रों में वार्ड समितियाँ गठित करना अनिवार्य","वार्ड समिति राज्यपाल नियुक्त करते हैं","वार्ड समिति केवल वित्तीय कार्य करती है"],a:1,e:"74वाँ संशोधन (1992) के अनुसार 3 लाख से अधिक जनसंख्या वाले नगरपालिका क्षेत्रों में वार्ड समितियों का गठन अनिवार्य है — नागरिक भागीदारी बढ़ाने के लिए।"},
{q:"'भारत की परमाणु नीति' में 'No First Use' (NFU) का क्या अर्थ है?",o:["भारत परमाणु हथियार नहीं बनाएगा","भारत पहले परमाणु हमला नहीं करेगा — केवल जवाबी कार्रवाई में उपयोग","भारत परमाणु संधियों में शामिल नहीं","भारत केवल ऊर्जा के लिए परमाणु"],a:1,e:"1998 में परमाणु परीक्षण के बाद भारत ने NFU नीति घोषित की — परमाणु हथियारों का पहला उपयोग नहीं, पर यदि कोई भारत पर परमाणु हमला करे तो विनाशकारी जवाबी कार्रवाई।"},
{q:"'सार्क' (SAARC) की स्थापना के बावजूद यह अप्रभावी क्यों रहा?",o:["सदस्य देश कम हैं","भारत-पाकिस्तान तनाव और द्विपक्षीय मुद्दों को SAARC में न उठाने की शर्त — क्षेत्रीय सहयोग बाधित हुआ","आर्थिक असमानता","भाषायी विविधता"],a:1,e:"SAARC के चार्टर में द्विपक्षीय मुद्दे उठाने पर रोक है। भारत-पाकिस्तान शत्रुता से शिखर सम्मेलन रुके (2016 के बाद कोई शिखर सम्मेलन नहीं)। BIMSTEC अब अधिक सक्रिय है।"},
{q:"'संयुक्त राष्ट्र सुरक्षा परिषद' में 'वीटो शक्ति' किन देशों के पास है और भारत इसे क्यों चुनौती देता है?",o:["G7 देश","P5 — अमेरिका, रूस, चीन, UK, फ्रांस — भारत इसे औपनिवेशिक युग की व्यवस्था और अलोकतांत्रिक मानता है","NATO देश","G20 देश"],a:1,e:"P5 की वीटो शक्ति 1945 की व्यवस्था है। भारत स्थायी सदस्यता और UNSC सुधार का समर्थक है — G4 (भारत, जर्मनी, जापान, ब्राजील) के साथ। वीटो की शक्ति वैश्विक समस्याओं के समाधान में बाधक बनती है।"},
{q:"'भारत की विदेश नीति' में 'नेबरहुड फर्स्ट' (Neighbourhood First) नीति का क्या अर्थ है?",o:["भारत केवल पड़ोसियों से व्यापार करेगा","पड़ोसी देशों को विकास सहायता और सहयोग में प्राथमिकता — बांग्लादेश, नेपाल, भूटान, श्रीलंका","पाकिस्तान के साथ संबंध","चीन से दूरी"],a:1,e:"2014 से 'Neighbourhood First' नीति के तहत भारत ने नेपाल, भूटान, बांग्लादेश, श्रीलंका को बिजली, बंदरगाह, रेलवे और विकास सहायता में प्राथमिकता दी।"},
{q:"'भारत में नागरिकता' के संदर्भ में 'OCI' (Overseas Citizen of India) क्या है?",o:["भारतीय नागरिकता का एक प्रकार जो दोहरी नागरिकता देता है","एक विशेष दर्जा जो विदेशी भारतीय मूल के व्यक्तियों को दीर्घकालिक वीज़ा और कुछ अधिकार देता है पर मतदान और सरकारी नौकरी नहीं","पाकिस्तानी नागरिकों के लिए","केवल NRI के लिए"],a:1,e:"OCI (2005) — भारतीय मूल के विदेशी नागरिकों को आजीवन वीज़ा, काम करने, पढ़ने का अधिकार — पर मतदान, सरकारी नौकरी और कृषि भूमि खरीद का अधिकार नहीं। दोहरी नागरिकता नहीं है।"},
{q:"'भारत के संविधान में संशोधन प्रक्रिया' किस प्रकार की है?",o:["पूरी तरह कठोर — साधारण बहुमत से संशोधन असंभव","मिश्रित — कुछ अनुच्छेद साधारण बहुमत से, कुछ विशेष बहुमत से, कुछ राज्यों की सहमति से भी","पूरी तरह लचीली","केवल न्यायालय संशोधन कर सकता है"],a:1,e:"भारत की संशोधन प्रक्रिया (अनु. 368) तीन प्रकार की है: साधारण बहुमत (नए राज्य), विशेष बहुमत (2/3 + उपस्थित और मतदान), और विशेष बहुमत + आधे राज्यों की सहमति (संघीय ढाँचे से जुड़े)।"},
{q:"'लोकपाल' की स्थापना किस अधिनियम के तहत हुई और इसका क्या कार्य है?",o:["RTI Act 2005 — सूचना देना","लोकपाल और लोकायुक्त अधिनियम 2013 — केंद्रीय सरकारी कर्मचारियों और लोकसेवकों के विरुद्ध भ्रष्टाचार की जाँच","CAG Act — वित्तीय लेखापरीक्षा","IPC — आपराधिक मामले"],a:1,e:"अन्ना हजारे के आंदोलन के बाद 2013 में लोकपाल अधिनियम पारित हुआ। प्रधानमंत्री सहित उच्च पदों पर भ्रष्टाचार की जाँच — पहले लोकपाल न्यायमूर्ति पिनाकी चंद्र घोष 2019 में नियुक्त हुए।"},
{q:"'भारत-चीन संबंध' में '1962 का युद्ध' किन कारणों से हुआ?",o:["व्यापारिक विवाद","तिब्बत पर चीनी कब्जा, मैकमोहन रेखा विवाद, और 'फॉरवर्ड पॉलिसी' का टकराव","धार्मिक विवाद","पाकिस्तान की भूमिका"],a:1,e:"1959 में तिब्बती विद्रोह के बाद दलाई लामा को भारत में शरण और भारत की 'Forward Policy' (अग्रिम चौकियाँ) ने चीन को उकसाया। मैकमोहन रेखा और अक्साई चिन विवाद पुराने थे।"},
{q:"'भारत में संघीय प्रणाली' के संदर्भ में 'केंद्र की ओर झुकाव' (Centralising Tendencies) के क्या उदाहरण हैं?",o:["राज्य सूची में अधिक विषय","राज्यपाल की नियुक्ति, अनु. 356 का उपयोग, अखिल भारतीय सेवाएँ, और संसद का राज्य सूची पर कानून बनाना (आपातकाल में)","राज्यों को अधिक कर","पंचायती राज को शक्तियाँ"],a:1,e:"भारतीय संघवाद केंद्र-उन्मुख है — राज्यपाल केंद्र नियुक्त करता है, IAS-IPS केंद्र नियंत्रित, अनु. 356 का राजनीतिक दुरुपयोग, और आपातकाल में राज्य सूची पर केंद्रीय विधायन।"},
{q:"'भारत का चुनाव आयोग' किस प्रकार से स्वतंत्र है?",o:["मुख्य चुनाव आयुक्त को संसद हटाती है","मुख्य चुनाव आयुक्त को सर्वोच्च न्यायालय के न्यायाधीश की तरह महाभियोग से ही हटाया जा सकता है","राष्ट्रपति कभी भी हटा सकते हैं","प्रधानमंत्री हटाते हैं"],a:1,e:"मुख्य चुनाव आयुक्त (CEC) की सुरक्षा — केवल संसद के महाभियोग से हटाया जा सकता है (सर्वोच्च न्यायालय न्यायाधीश की तरह)। वेतन संचित निधि से — संसद में मतदान नहीं। यही उनकी स्वतंत्रता का आधार है।"},
{q:"'भारत में नागरिक समाज' और 'राजनीतिक दलों' में मुख्य अंतर क्या है?",o:["दोनों समान हैं","नागरिक समाज (NGO, मीडिया, ट्रेड यूनियन) सत्ता के बाहर रहकर दबाव बनाता है; राजनीतिक दल सत्ता प्राप्ति के लिए चुनाव लड़ते हैं","NGO चुनाव लड़ते हैं","दल सत्ता नहीं चाहते"],a:1,e:"नागरिक समाज — RTI आंदोलन, पर्यावरण संगठन, मीडिया — सरकार पर दबाव बनाता है पर सत्ता नहीं चाहता। राजनीतिक दल चुनाव जीतकर सत्ता प्राप्त करना चाहते हैं — दोनों लोकतंत्र के अनिवार्य अंग हैं।"},
{q:"'विश्व व्यापार संगठन' (WTO) में 'कृषि समझौते' पर भारत का रुख क्या है?",o:["पूर्ण उदारीकरण का समर्थन","विकासशील देशों को खाद्य सुरक्षा के लिए कृषि सब्सिडी का अधिकार — 'Peace Clause' का विस्तार","कृषि व्यापार बंद करना","अमेरिकी प्रस्ताव का समर्थन"],a:1,e:"भारत ने WTO में MSP (न्यूनतम समर्थन मूल्य) को कृषि सब्सिडी माने जाने का विरोध किया। 2013 में भारत ने बाली समझौते को तब तक रोका जब तक 'Peace Clause' पर स्थायी समाधान नहीं मिला।"},
{q:"'भारत में आरक्षण नीति' के संदर्भ में 'इंदिरा साहनी बनाम भारत संघ' (1992) के निर्णय का क्या महत्व है?",o:["आरक्षण समाप्त किया","OBC आरक्षण वैध, 50% की सीमा निर्धारित, क्रीमी लेयर की अवधारणा — 'आर्थिक आधार' पर आरक्षण असंवैधानिक","SC/ST आरक्षण बढ़ाया","निजी क्षेत्र में आरक्षण"],a:1,e:"इंदिरा साहनी वाद (मंडल आयोग केस) ने OBC के 27% आरक्षण को वैध माना, कुल आरक्षण 50% से अधिक नहीं, क्रीमी लेयर (धनी OBC) को बाहर रखा, और केवल आर्थिक आधार पर आरक्षण असंवैधानिक घोषित किया।"},
{q:"'भारत की संसद में महिला प्रतिनिधित्व' बढ़ाने के लिए हाल में क्या कदम उठाया गया?",o:["2010 में महिला आरक्षण बिल पारित","नारीशक्ति वंदन अधिनियम 2023 — लोकसभा और राज्य विधानसभाओं में 33% आरक्षण","महिलाओं को मतदान का नया अधिकार","राज्यसभा में 50% आरक्षण"],a:1,e:"सितंबर 2023 में संसद ने 'नारीशक्ति वंदन अधिनियम' (106वाँ संशोधन) पारित किया — लोकसभा, राज्य विधानसभाओं और दिल्ली विधानसभा में महिलाओं के लिए 33% आरक्षण, परिसीमन और जनगणना के बाद लागू होगा।"},
{q:"'भारत में न्यायपालिका' की स्वतंत्रता सुनिश्चित करने के क्या संवैधानिक उपाय हैं?",o:["न्यायाधीश निर्वाचित होते हैं","न्यायाधीशों की नियुक्ति की विशेष प्रक्रिया, महाभियोग से ही हटाना, वेतन संचित निधि से, सेवानिवृत्ति के बाद प्रैक्टिस पर प्रतिबंध","प्रधानमंत्री न्यायाधीश नियुक्त करते हैं","न्यायाधीशों की 3 वर्ष की नियुक्ति"],a:1,e:"न्यायपालिका की स्वतंत्रता — कॉलेजियम नियुक्ति प्रक्रिया, केवल महाभियोग से निष्कासन, वेतन-पेंशन संचित निधि (संसद वोट नहीं), उच्च न्यायालय में प्रैक्टिस पर प्रतिबंध — ये सब मिलकर न्यायिक स्वतंत्रता सुनिश्चित करते हैं।"},
{q:"'भारत-अमेरिका संबंध' में '123 समझौता' (2008) क्या था?",o:["सैन्य समझौता","नागरिक परमाणु सहयोग समझौता — भारत को परमाणु ईंधन और तकनीक मिलेगी, NPT से बाहर रहने के बावजूद","व्यापार समझौता","अंतरिक्ष सहयोग"],a:1,e:"Indo-US Civil Nuclear Deal (2008) — भारत IAEA सुरक्षा उपायों के तहत नागरिक परमाणु कार्यक्रम के लिए ईंधन और तकनीक पा सकेगा। NPT पर हस्ताक्षर न करने के बावजूद यह अपवाद भारत की कूटनीतिक जीत थी।"},
{q:"'भारत में विपक्ष की भूमिका' क्या है? 'नेता प्रतिपक्ष' को आधिकारिक दर्जा कब मिलता है?",o:["विपक्ष का कोई संवैधानिक दर्जा नहीं","विपक्ष वैकल्पिक सरकार तैयार करता है, जाँच का कार्य — नेता प्रतिपक्ष को 10% सीटें (55 लोकसभा) होने पर कैबिनेट मंत्री दर्जा","विपक्ष केवल बाधा डालता है","नेता प्रतिपक्ष राष्ट्रपति नियुक्त करते हैं"],a:1,e:"'नेता प्रतिपक्ष वेतन और भत्ते अधिनियम 1977' के अनुसार लोकसभा में 10% सीटें (न्यूनतम 55) होने पर नेता प्रतिपक्ष को कैबिनेट मंत्री का दर्जा मिलता है। 2014-2024 में विपक्ष यह संख्या नहीं पा सका।"},
{q:"'भारत में राजनीतिक वित्तपोषण' के संदर्भ में 'इलेक्टोरल बॉन्ड' (Electoral Bond) क्या था?",o:["चुनाव में मतदाताओं को दिया जाने वाला बॉन्ड","राजनीतिक दलों को चंदा देने का गुप्त माध्यम — 2018 में शुरू, 2024 में सर्वोच्च न्यायालय ने असंवैधानिक घोषित किया","सरकारी बॉन्ड स्कीम","विदेशी चंदा"],a:1,e:"Electoral Bond Scheme 2018 में शुरू हुई — कोई भी व्यक्ति/कंपनी SBI से बॉन्ड खरीदकर राजनीतिक दलों को दे सकती थी। दाता की जानकारी गुप्त रहती थी। फरवरी 2024 में सर्वोच्च न्यायालय ने इसे असंवैधानिक घोषित किया।"},
{q:"'भारत-पाकिस्तान संबंध' में 'शिमला समझौता' (1972) का क्या महत्व था?",o:["1947 के विभाजन का समझौता","1971 युद्ध के बाद — द्विपक्षीय वार्ता से विवाद सुलझाने और LOC को सम्मान देने का समझौता","कश्मीर भारत को दे दिया","युद्ध विराम की घोषणा"],a:1,e:"1972 में इंदिरा गाँधी और जुल्फिकार अली भुट्टो के बीच शिमला समझौता हुआ — 93,000 युद्धबंदी वापसी, LOC को सम्मान, और द्विपक्षीय वार्ता से कश्मीर सहित सभी विवाद सुलझाने का वचन।"},
{q:"'भारत के प्रधानमंत्री' के 'विवेकाधिकार' (Discretionary Powers) क्या हैं?",o:["प्रधानमंत्री के पास कोई विवेकाधिकार नहीं","मंत्रिमंडल का गठन, विभाग आवंटन, राष्ट्रपति को मंत्री हटाने की सलाह, संसद सत्र और लोकसभा भंग करने की सिफारिश","केवल विदेश नीति","केवल बजट"],a:1,e:"संसदीय प्रणाली में प्रधानमंत्री वस्तुतः सर्वाधिक शक्तिशाली — मंत्रिमंडल गठन, विभाग वितरण, किसे हटाएँ, कब चुनाव कराएँ — सब प्रधानमंत्री तय करते हैं। राष्ट्रपति प्रायः सलाह मानते हैं।"}
]}

const ST={history:{ans:{},sub:false,elapsed:0,timer:null},geo:{ans:{},sub:false,elapsed:0,timer:null},pol:{ans:{},sub:false,elapsed:0,timer:null}};
let cur='history';

function sw(k){
  cur=k;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['history','geo','pol'][i]===k));
  document.querySelectorAll('.paper').forEach(p=>p.classList.remove('active'));
  document.getElementById('p-'+k).classList.add('active');
}
function fmt(s){const m=Math.floor(s/60),sc=s%60;return m+':'+(sc<10?'0':'')+sc;}
function startTimer(k){
  if(ST[k].timer)return;
  ST[k].timer=setInterval(()=>{
    ST[k].elapsed++;
    const el=document.getElementById('tmr-'+k);
    if(el)el.textContent='⏱ '+fmt(ST[k].elapsed);
    if(ST[k].elapsed>=P[k].time*60&&!ST[k].sub)doSubmit(k);
  },1000);
}
function pick(k,qi,oi){
  if(ST[k].sub)return;
  ST[k].ans[qi]=oi;
  if(!ST[k].timer)startTimer(k);
  redrawOpts(k,qi);
  updProg(k);
}
function redrawOpts(k,qi){
  const q=P[k].questions[qi];
  const wrap=document.getElementById('o-'+k+'-'+qi);
  if(!wrap)return;
  wrap.querySelectorAll('.opt').forEach((btn,oi)=>{
    btn.className='opt';
    if(ST[k].sub){btn.disabled=true;if(oi===q.a)btn.classList.add('ok');else if(ST[k].ans[qi]===oi)btn.classList.add('bad');}
    else{if(ST[k].ans[qi]===oi)btn.classList.add('sel');}
  });
  const expEl=document.getElementById('exp-'+k+'-'+qi);
  if(expEl&&ST[k].sub)expEl.classList.add('show');
}
function updProg(k){
  const total=P[k].questions.length,done=Object.keys(ST[k].ans).length;
  const pf=document.getElementById('pf-'+k),pt=document.getElementById('pt-'+k);
  if(pf)pf.style.width=(done/total*100)+'%';
  if(pt)pt.textContent=done+'/'+total+' उत्तरित';
}
function doSubmit(k){
  if(ST[k].sub)return;
  ST[k].sub=true;clearInterval(ST[k].timer);
  const qs=P[k].questions;let correct=0;
  qs.forEach((_,qi)=>{if(ST[k].ans[qi]===qs[qi].a)correct++;redrawOpts(k,qi);});
  const total=qs.length,wrong=Object.keys(ST[k].ans).length-correct,skip=total-Object.keys(ST[k].ans).length;
  const pct=Math.round(correct/total*100);
  const rb=document.getElementById('rb-'+k);
  if(rb){
    rb.classList.add('show');
    const col=pct>=60?'#2e7d32':pct>=40?'#f57f17':'#c62828';
    const msg=pct>=70?'उत्कृष्ट! CUET के लिए तैयार हैं 🎉':pct>=50?'अच्छा! थोड़ा और अभ्यास करें 📖':'और तैयारी आवश्यक है 💪';
    rb.innerHTML='<div class="score-big" style="color:'+col+'">'+pct+'%</div>'
      +'<div class="score-lbl">स्कोर: '+correct+'/'+total+' | समय: '+fmt(ST[k].elapsed)+'</div>'
      +'<div class="score-grid">'
      +'<div class="scard"><span style="color:#2e7d32">'+correct+'</span>सही</div>'
      +'<div class="scard"><span style="color:#c62828">'+wrong+'</span>गलत</div>'
      +'<div class="scard"><span style="color:#666">'+skip+'</span>छोड़े</div>'
      +'</div><div class="rating">'+msg+'</div>'
      +'<div class="act-row"><button class="btn-reset" onclick="reset(\''+k+'\')">🔄 दोबारा प्रयास करें</button></div>';
    rb.scrollIntoView({behavior:'smooth',block:'start'});
  }
}
function reset(k){ST[k]={ans:{},sub:false,elapsed:0,timer:null};render(k);}
function render(k){
  const d=P[k],s=ST[k],total=d.questions.length,done=Object.keys(s.ans).length;
  const labs=['क','ख','ग','घ'];
  let html='<div class="paper-header"><h2>'+d.title+' — प्रश्न पत्र (सेट 2)</h2><p>'+d.sub+'</p>'
    +'<div class="meta-row">'
    +'<span class="badge">📋 '+total+' प्रश्न</span>'
    +'<span class="badge">⏱ '+d.time+' मिनट</span>'
    +'<span class="badge">✅ +1 सही &nbsp; ❌ 0 गलत</span>'
    +'<span class="badge timer" id="tmr-'+k+'">⏱ 0:00</span>'
    +'</div></div>'
    +'<div class="prog-row"><div class="prog-bar"><div class="prog-fill" id="pf-'+k+'" style="width:'+(done/total*100)+'%"></div></div>'
    +'<span class="prog-txt" id="pt-'+k+'">'+done+'/'+total+' उत्तरित</span></div>';
  d.questions.forEach((q,qi)=>{
    html+='<div class="qcard"><div class="qnum">प्रश्न '+(qi+1)+'</div><div class="qtxt">'+q.q+'</div>'
      +'<div class="opts" id="o-'+k+'-'+qi+'">'
      +q.o.map((opt,oi)=>'<button class="opt'+(s.sub?(oi===q.a?' ok':(s.ans[qi]===oi?' bad':'')):(s.ans[qi]===oi?' sel':''))+'" onclick="pick(\''+k+'\','+qi+','+oi+')"'+(s.sub?' disabled':'')+'>'
        +'<span class="olabel">'+labs[oi]+')</span><span>'+opt+'</span></button>').join('')
      +'</div>'
      +'<div class="exp'+(s.sub?' show':'')+'" id="exp-'+k+'-'+qi+'">💡 <strong>व्याख्या:</strong> '+q.e+'</div>'
      +'</div>';
  });
  if(!s.sub)html+='<div class="submit-wrap"><button class="submit-btn" onclick="doSubmit(\''+k+'\')">परिणाम देखें →</button></div>';
  html+='<div class="result-box" id="rb-'+k+'"></div>';
  document.getElementById('p-'+k).innerHTML=html;
}
['history','geo','pol'].forEach(render);
</script>
